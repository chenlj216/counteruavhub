name: Update Counter-UAS News

on:
  schedule:
    - cron: '15 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update news candidates
        run: npm run update-news -- --write --allow-fetch-failure --max-new=8 --limit=80

      - name: Test news updater
        run: npm run test:news

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build

      - name: Publish updated news data
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No news data changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "Update counter-UAS news"
          git push
