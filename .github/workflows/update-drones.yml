name: Update Drone Model Database

on:
  schedule:
    - cron: '45 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-drones:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update drone model candidates
        run: npm run update-drones -- --write --allow-fetch-failure --min-source-success=1

      - name: Test drone updater
        run: npm run test:drones

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build

      - name: Publish updated drone data
        run: |
          if git diff --quiet -- data/drones.json; then
            echo "No drone data changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/drones.json
          git commit -m "Update drone model database"
          git push
